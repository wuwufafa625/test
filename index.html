<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard Google Sheet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:linear-gradient(135deg,#6a11cb,#2575fc,#00c6ff);

min-height:100vh;

padding:40px;

}

.container{

max-width:1400px;

margin:auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

color:#fff;

}

.title{

font-size:34px;

font-weight:700;

}

.clock{

font-size:18px;

font-weight:600;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:30px;

}

.card{

background:rgba(255,255,255,.15);

backdrop-filter:blur(15px);

border-radius:18px;

padding:25px;

color:#fff;

box-shadow:0 10px 25px rgba(0,0,0,.2);

transition:.3s;

}

.card:hover{

transform:translateY(-8px);

}

.card h3{

font-size:15px;

opacity:.8;

}

.card h1{

font-size:40px;

margin-top:10px;

}

.table-box{

background:#fff;

padding:20px;

border-radius:18px;

box-shadow:0 15px 35px rgba(0,0,0,.15);

}

table{

width:100%!important;

}

thead{

background:#2575fc;

color:white;

}

tbody tr:hover{

background:#eef5ff!important;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title">
<i class="fa-solid fa-chart-line"></i>
Dashboard Monitoring
</div>

<div class="clock" id="jam"></div>

</div>

<div class="cards">

<div class="card">

<h3>Total Data</h3>

<h1 id="total">0</h1>

</div>

<div class="card">

<h3>Status</h3>

<h1>Online</h1>

</div>

<div class="card">

<h3>Update</h3>

<h1 id="tgl">-</h1>

</div>

</div>

<div class="table-box">

<table id="tbl" class="display"></table>

</div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

const csv="https://docs.google.com/spreadsheets/d/e/2PACX-1vTlFPf8ouSJ4MsB_oyvQKEMYy3ZLOCsiugJFmRZVr5sJ99jIFWDWtg4-M67yZqZZ0drl3HbaiFXtOj7/pub?output=csv&gid=0";

function load(){

Papa.parse(csv,{

download:true,

header:true,

complete:function(r){

let d=r.data.filter(x=>Object.values(x).join("")!="");

document.getElementById("total").innerHTML=d.length;

document.getElementById("tgl").innerHTML=new Date().toLocaleDateString();

$('#tbl').DataTable({

destroy:true,

data:d,

columns:Object.keys(d[0]).map(x=>({title:x,data:x})),

pageLength:10

});

}

});

}

load();

setInterval(load,30000);

setInterval(()=>{

document.getElementById("jam").innerHTML=new Date().toLocaleTimeString();

},1000);

</script>

</body>
</html>
